<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kategorie - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-4xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Kategorie</h1>
    <div class="space-x-2">
      <a th:href="@{/admin/product}" class="text-gray-500 hover:underline">Powrót do produktów</a>
      <a th:href="@{/admin/category/new}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg shadow hover:bg-indigo-700">+ Nowa Kategoria</a>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b">
      <tr>
        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">ID</th>
        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Nazwa Kategorii</th>
        <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase text-right">Akcje</th>
      </tr>
      </thead>
      <tbody class="divide-y">
      <tr th:each="cat : ${categories}" class="hover:bg-gray-50 transition">
        <td class="px-6 py-4 font-mono text-sm text-gray-400">
          <span th:text="${cat.id}">1</span>
        </td>
        <td class="px-6 py-4 font-bold text-gray-700">
          <span th:text="${cat.name}">Nazwa</span>
        </td>
        <td class="px-6 py-4 text-right space-x-3">
          <a th:href="@{/admin/category/{id}/edit(id=${cat.id})}" class="text-indigo-600 hover:underline">Edytuj</a>

          <form th:action="@{/admin/category/{id}(id=${cat.id})}" method="post" class="inline">
            <button type="submit" class="text-red-600 hover:underline" onclick="return confirm('Czy na pewno?')">Usuń</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${#lists.isEmpty(categories)}" class="text-center py-10 text-gray-500">
    Brak kategorii w bazie.
  </div>
</div>
</body>
</html>
