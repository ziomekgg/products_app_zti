<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dodaj Nowy Produkt</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Nowy Produkt</h1>

  <form th:action="@{/admin/product/new}" th:object="${product}" method="post" enctype="multipart/form-data" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Nazwa</label>
      <input type="text" th:field="*{name}" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Cena</label>
        <input type="number" step="0.01" th:field="*{price}" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Ilość (Stan)</label>
        <input type="number" th:field="*{stockQuantity}" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Kategoria</label>
      <select th:field="*{category}" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Kategoria</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Opis</label>
      <textarea th:field="*{description}" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md p-2"></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Zdjęcia produktu</label>
      <input type="file" name="files" multiple accept="image/*"
             class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
      <p class="text-xs text-gray-400 mt-1">Możesz wybrać wiele zdjęć naraz (np. z klawiszem Ctrl).</p>
    </div>

    <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
      Dodaj produkt
    </button>
  </form>
</div>
</body>
</html>
