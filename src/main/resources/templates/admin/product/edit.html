<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edytuj Produkt</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Edycja Produktu</h1>
    <a th:href="@{/admin/product}" class="text-gray-500 hover:underline text-sm">Anuluj</a>
  </div>

  <form th:action="@{/admin/product/{id}/edit(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700">Nazwa produktu</label>
      <input type="text" th:field="*{name}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-indigo-500 focus:border-indigo-500" required>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Cena (PLN)</label>
        <input type="number" step="0.01" th:field="*{price}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Stan magazynowy</label>
        <input type="number" th:field="*{stockQuantity}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm" required>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Kategoria</label>
      <select th:field="*{category}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}">Kategoria</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Aktualne zdjęcie</label>
      <div class="mt-2 mb-4">
        <!-- Wyświetlamy stare zdjęcie, jeśli produkt je posiada -->
        <img th:if="${product.imageUrl}"
             th:src="@{'/uploads/' + ${product.imageUrl}}"
             alt="Podgląd"
             class="w-32 h-32 object-cover rounded-lg border shadow-sm">
        <p th:unless="${product.imageUrl}" class="text-gray-400 italic text-sm">Brak zdjęcia</p>
      </div>

      <label class="block text-sm font-medium text-gray-700">Zmień zdjęcie (opcjonalnie)</label>
      <!-- 2. Dodaj input dla pliku o nazwie "file" -->
      <input type="file" name="file" accept="image/*"
             class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
      <p class="text-xs text-gray-500 mt-1">Pozostaw puste, aby zachować obecne zdjęcie.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Opis</label>
      <textarea th:field="*{description}" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm"></textarea>
    </div>

    <div class="pt-4">
      <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
        Zapisz zmiany
      </button>
    </div>
  </form>
</div>
</body>
</html>
