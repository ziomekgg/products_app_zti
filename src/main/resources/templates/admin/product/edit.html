<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edytuj Produkt</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Edycja Produktu</h1>
    <a th:href="@{/admin/product}" class="text-gray-500 hover:underline text-sm">Anuluj</a>
  </div>

  <!-- GŁÓWNY FORMULARZ EDYCJI -->
  <form id="edit-product-form" th:action="@{/admin/product/{id}/edit(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700">Nazwa produktu</label>
      <input type="text" th:field="*{name}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-indigo-500 focus:border-indigo-500" required>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Cena (PLN)</label>
        <input type="number" step="0.01" th:field="*{price}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Stan magazynowy</label>
        <input type="number" th:field="*{stockQuantity}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm" required>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Kategoria</label>
      <select th:field="*{category}" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm">
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}">Kategoria</option>
      </select>
    </div>

    <!-- SEKCJA ZDJĘCIA Z PODGLĄDEM LIVE -->
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
      <label class="block text-sm font-bold text-gray-700 mb-2">Zarządzanie zdjęciem</label>

      <div class="mb-4">
        <div class="flex items-end gap-4">
          <!-- id="image-preview" pozwala skryptowi JS podmienić źródło obrazka -->
          <img id="image-preview"
               th:src="${product.imageUrl != null ? '/uploads/' + product.imageUrl : 'https://via.placeholder.com/150'}"
               alt="Podgląd"
               class="w-32 h-32 object-cover rounded-lg border shadow-sm bg-white">

          <!-- Przycisk usuwania widoczny tylko gdy zdjęcie ISTNIEJE W BAZIE -->
          <button th:if="${product.imageUrl}"
                  type="submit"
                  form="delete-image-form"
                  class="bg-red-50 text-red-600 px-4 py-2 rounded-lg border border-red-200 hover:bg-red-100 transition text-sm font-semibold mb-1"
                  onclick="return confirm('Czy na pewno chcesz trwale usunąć to zdjęcie z serwera?')">
            Usuń aktualne
          </button>
        </div>
      </div>

      <label class="block text-sm font-medium text-gray-700 mt-2">Wybierz nowe zdjęcie</label>
      <!-- onchange="previewImage(event)" uruchamia skrypt podglądu -->
      <input type="file" id="image-input" name="file" accept="image/*"
             onchange="previewImage(event)"
             class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
      <p class="text-xs text-gray-400 mt-1 italic">Podgląd zmieni się natychmiast po wybraniu pliku.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Opis produktu</label>
      <textarea th:field="*{description}" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm"></textarea>
    </div>

    <div class="pt-6">
      <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
        Zapisz wszystkie zmiany
      </button>
    </div>
  </form>

  <!-- FORMULARZ USUWANIA (UKRYTY) -->
  <form th:if="${product.imageUrl}"
        id="delete-image-form"
        th:action="@{/admin/product/{id}/delete-image(id=${product.id})}"
        method="post"
        class="hidden">
  </form>

</div>

<!-- SKRYPT PODGLĄDU ZDJĘCIA (JS) -->
<script>
  function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
      const output = document.getElementById('image-preview');
      output.src = reader.result;
    };
    if(event.target.files[0]) {
      reader.readAsDataURL(event.target.files[0]);
    }
  }
</script>

</body>
</html>
