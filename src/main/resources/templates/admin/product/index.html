<section th:replace="~{layout :: main-layout(~{::body})}">
  <body>
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-black text-gray-900">Magazyn Części</h1>
        <p class="text-gray-500">Zarządzaj stanem</p>
      </div>
      <a th:href="@{/admin/product/new}" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-2xl shadow-lg transition">
        + Dodaj Nowy Produkt
      </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-6 py-4">Produkt</th>
          <th class="px-6 py-4">Cena</th>
          <th class="px-6 py-4">Akcje</th>
        </tr>
        </thead>
        <tbody class="divide-y">
        <tr th:each="product : ${products}">
          <td class="px-6 py-4 font-bold" th:text="${product.name}">Nazwa</td>
          <td class="px-6 py-4" th:text="${product.price}">0.00</td>
          <td class="px-6 py-4">
            <a th:href="@{/admin/product/{id}/edit(id=${product.id})}" class="text-indigo-600">Edytuj</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div> </body> </section>
