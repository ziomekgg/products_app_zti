<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<section th:replace="~{layout :: main-layout(~{::body})}">
  <body>
  <div class="max-w-7xl mx-auto">
    <!-- NAGŁÓWEK -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-black text-gray-900">Magazyn Części</h1>
        <p class="text-gray-500">Zarządzaj asortymentem i stanami magazynowymi</p>
      </div>
      <a th:href="@{/admin/product/new}" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-2xl shadow-lg transition flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
        </svg>
        Dodaj Nowy Produkt
      </a>
    </div>

    <!-- TABELA -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-gray-50/50 border-b border-gray-100">
        <tr>
          <th class="px-6 py-4 font-semibold text-gray-600">Foto</th>
          <th class="px-6 py-4 font-semibold text-gray-600">Produkt</th>
          <th class="px-6 py-4 font-semibold text-gray-600">Cena</th>
          <th class="px-6 py-4 font-semibold text-gray-600">Stan</th>
          <th class="px-6 py-4 font-semibold text-gray-600 text-right">Akcje</th>
        </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
        <tr th:each="product : ${products}" class="hover:bg-gray-50/50 transition">
          <!-- Miniaturka Zdjęcia -->
          <td class="px-6 py-4">
            <div class="w-14 h-14 rounded-xl overflow-hidden bg-gray-100 border border-gray-200">
              <img th:if="${product.imageUrl}"
                   th:src="@{'/uploads/' + ${product.imageUrl}}"
                   class="w-full h-full object-cover"
                   alt="Product image">
              <div th:unless="${product.imageUrl}" class="w-full h-full flex items-center justify-center text-[10px] text-gray-400 font-medium">
                BRAK
              </div>
            </div>
          </td>

          <!-- Nazwa i Kategoria -->
          <td class="px-6 py-4">
            <div class="font-bold text-gray-900" th:text="${product.name}">Nazwa</div>
            <div class="text-xs text-gray-400" th:if="${product.category}" th:text="${product.category.name}">Kategoria</div>
          </td>

          <!-- Cena -->
          <td class="px-6 py-4 font-medium text-gray-700">
            <span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span> PLN
          </td>

          <!-- Stan Magazynowy -->
          <td class="px-6 py-4">
            <div class="flex items-center gap-2">
              <span th:text="${product.stockQuantity}"
                    th:class="${product.stockQuantity <= 5} ? 'px-2.5 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-600' : 'px-2.5 py-0.5 rounded-full text-xs font-bold bg-green-100 text-green-600'">
                0
              </span>
              <span class="text-gray-400 text-xs">szt.</span>
            </div>
          </td>

          <!-- Przyciski Akcji -->
          <td class="px-6 py-4 text-right">
            <div class="flex justify-end items-center gap-3">
              <a th:href="@{/admin/product/{id}/edit(id=${product.id})}"
                 class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition"
                 title="Edytuj">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                </svg>
              </a>

              <form th:action="@{/admin/product/{id}(id=${product.id})}" method="post"
                    onsubmit="return confirm('Czy na pewno chcesz usunąć ten produkt? Operacja jest nieodwracalna.');"
                    class="inline">
                <button type="submit" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition" title="Usuń">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                  </svg>
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
  </body>
</section>
</html>
