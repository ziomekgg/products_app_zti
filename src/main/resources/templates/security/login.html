<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Logowanie</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
<div class="max-w-md w-full bg-white p-8 border border-gray-200 rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold mb-6 text-center">Logowanie</h2>

  <div th:if="${param.error}" class="bg-red-100 text-red-700 p-2 rounded mb-4 text-center">
    Błędny email lub hasło
  </div>

  <form th:action="@{/login}" method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Email</label>
      <input type="text" name="username" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Hasło</label>
      <input type="password" name="password" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required>
    </div>
    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition">
      Zaloguj się
    </button>
  </form>
</div>
</body>
</html>
