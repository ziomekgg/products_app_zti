<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="main-layout(content)" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<!-- PASEK STATUSU -->
<div class="bg-gray-900 text-gray-400 py-2 px-4 text-xs">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex space-x-4">
            <span>Status: <span class="text-green-500 font-bold">ONLINE</span></span>
            <span>Baza: <span class="text-indigo-400 font-semibold uppercase">PostgreSQL</span></span>
        </div>
        <div class="flex space-x-4 uppercase font-bold text-[10px]">
            <a href="#" class="hover:text-white transition">Moje Konto</a>
            <a href="#" class="hover:text-white text-red-400 transition">Wyloguj</a>
        </div>
    </div>
</div>

<!-- NAWIGACJA -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-8">
            <!-- LOGO: Teraz prowadzi do Home (/) -->
            <a th:href="@{/}" class="text-2xl font-black text-indigo-600 tracking-tighter uppercase">
                HARDWARE<span class="text-gray-900">STORE</span>
            </a>
            <div class="hidden md:flex space-x-6 font-bold text-gray-500 uppercase text-[11px] tracking-widest">
                <a th:href="@{/product}" class="hover:text-indigo-600 transition">Produkty</a>
                <a th:href="@{/admin/category}" class="hover:text-indigo-600 transition">Kategorie</a>
            </div>
        </div>

        <div class="flex items-center space-x-6">
            <form th:action="@{/product/search}" method="GET" class="relative hidden lg:block">
                <input type="text" name="query" placeholder="Szukaj części..."
                       class="bg-gray-100 rounded-full py-2 px-4 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-64 border-transparent focus:bg-white transition-all">
                <div class="absolute left-3 top-2.5 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </form>

            <div class="flex items-center space-x-4">
                <!-- IKONY SVG -->
                <a href="#" class="text-gray-400 hover:text-red-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </a>
                <a href="#" class="text-gray-700 hover:text-indigo-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                </a>
                <a th:href="@{/admin/product}" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest hover:bg-indigo-700 transition-all active:scale-95 shadow-lg shadow-indigo-100">
                    Admin
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- CONTENT AREA: To jest punkt wpięcia dla KAŻDEJ strony -->
<main class="flex-grow py-8">
    <div th:replace="${content}"></div>
</main>

<footer class="bg-gray-900 text-gray-500 py-12 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center md:text-left flex justify-between items-center">
        <span class="text-white font-black uppercase tracking-tighter">Hardware Store</span>
        <span class="text-[10px] uppercase font-bold tracking-widest text-gray-600">2026 &copy; MODUŁ STEROWANIA</span>
    </div>
</footer>

</body>
</html>
