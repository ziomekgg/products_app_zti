<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Store | Witaj</title>
    <!-- Tailwind CSS do stylizacji -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<!-- Uproszczony Header tylko dla strony Home -->
<nav class="bg-white border-b border-gray-100 p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="text-2xl font-black text-indigo-600 tracking-tighter uppercase">
                HARDWARE<span class="text-gray-900">STORE</span>
            </span>
        <a th:href="@{/product}" class="text-sm font-bold uppercase tracking-widest text-gray-500 hover:text-indigo-600 transition">
            Wejdź do sklepu →
        </a>
    </div>
</nav>

<!-- Główna treść -->
<main class="flex-grow flex items-center justify-center">
    <section class="max-w-4xl mx-auto px-4 py-20 text-center">
        <div class="space-y-6">
            <h1 class="text-7xl font-black text-gray-900 tracking-tighter uppercase leading-none">
                Hardware <br> <span class="text-indigo-600">Store</span>
            </h1>
            <p class="text-xl text-gray-500 font-medium max-w-2xl mx-auto">
                Twoje centrum dowodzenia elektroniką. Najwyższa moc i czysta wydajność w jednym miejscu.
            </p>
            <div class="pt-10">
                <a th:href="@{/product}" class="inline-block bg-gray-900 text-white px-12 py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-indigo-600 transition-all shadow-2xl">
                    Rozpocznij zakupy
                </a>
            </div>
        </div>
    </section>
</main>

<!-- Stopka zgodna z Twoim życzeniem (taka jak w layout) -->
<footer class="bg-gray-900 text-gray-500 py-12">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
        <span class="text-white font-black uppercase tracking-tighter">Hardware Store</span>
        <span class="text-[10px] uppercase font-bold tracking-widest text-gray-600">2026 &copy; System Zarządzania</span>
    </div>
</footer>

</body>
</html>
