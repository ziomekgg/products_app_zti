<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${product.name}">Szczegóły Produktu</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white shadow-sm p-4 mb-8">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <a th:href="@{/product}" class="text-indigo-600 font-bold text-xl">Sklep</a>
    <a th:href="@{/product}" class="text-gray-500 hover:text-indigo-600">← Powrót do listy</a>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 pb-12">
  <div class="flex flex-col md:flex-row gap-12 bg-white p-8 rounded-3xl shadow-sm border border-gray-100">

    <!-- KOLUMNA LEWA: GALERIA -->
    <div class="md:w-1/2 space-y-6">
      <div class="relative aspect-square bg-gray-50 rounded-2xl overflow-hidden border border-gray-100">
        <!-- Obraz główny -->
        <img id="main-image"
             th:src="${product.imageUrl != null ? '/uploads/' + product.imageUrl : '/img/placeholder.png'}"
             class="w-full h-full object-contain p-4 transition-opacity duration-300"
             alt="Produkt">

        <!-- Przycisk ulubione (Jak w Twoim PHP) -->
        <form th:action="@{/product/{id}/favourite(id=${product.id})}" method="post" class="absolute top-4 right-4">
          <button type="submit" class="bg-white/80 backdrop-blur-sm p-3 rounded-full shadow-md hover:scale-110 transition group">
            <svg class="w-6 h-6 text-gray-300 group-hover:text-red-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
          </button>
        </form>
      </div>

      <!-- Miniaturki - z dodatkowym sprawdzeniem null -->
      <div class="grid grid-cols-4 gap-4" th:if="${product.images != null and !#lists.isEmpty(product.images)}">
        <button th:each="img : ${product.images}"
                th:if="${img != null and img.url != null}"
                class="thumbnail-btn border-2 rounded-xl overflow-hidden transition-all duration-200 aspect-square"
                th:classappend="${img.url == product.imageUrl} ? 'border-indigo-600 ring-2 ring-indigo-100' : 'border-gray-100'"
                th:onclick="'updateMainImage(\'/uploads/' + ${img.url} + '\', this)'">
          <img th:src="@{'/uploads/' + ${img.url}}" class="w-full h-full object-cover">
        </button>
      </div>
    </div>

    <!-- KOLUMNA PRAWA: INFORMACJE -->
    <div class="md:w-1/2 space-y-6">
      <div>
        <span class="text-indigo-600 font-bold text-sm uppercase tracking-wider" th:text="${product.category.name}">Kategoria</span>
        <h1 class="text-4xl font-extrabold text-gray-900 mt-2" th:text="${product.name}">Nazwa</h1>
      </div>

      <div class="flex items-baseline gap-4">
        <span class="text-3xl font-black text-gray-900" th:text="${product.price} + ' PLN'">0.00 PLN</span>
        <span th:if="${product.stockQuantity > 0}" class="text-green-600 font-semibold text-sm">
                    ● Dostępny (<span th:text="${product.stockQuantity}"></span> szt.)
                </span>
        <span th:unless="${product.stockQuantity > 0}" class="text-red-500 font-semibold text-sm">
                    ● Obecnie brak
                </span>
      </div>

      <p class="text-gray-600 text-lg leading-relaxed" th:text="${product.description}">Opis...</p>

      <div class="pt-8 border-t border-gray-100">
        <form class="flex flex-col gap-4">
          <div class="flex items-center gap-4">
            <label class="font-bold text-gray-700">Ilość:</label>
            <input type="number" value="1" min="1" th:max="${product.stockQuantity}"
                   class="w-24 border-2 border-gray-100 rounded-xl p-3 focus:border-indigo-500 outline-none transition text-center font-bold">
          </div>
          <button type="submit"
                  th:disabled="${product.stockQuantity <= 0}"
                  class="w-full bg-gray-900 text-white font-bold py-5 rounded-2xl hover:bg-indigo-600 transition-all shadow-xl hover:shadow-indigo-200 disabled:bg-gray-300 disabled:shadow-none flex items-center justify-center gap-3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            Dodaj do koszyka
          </button>
        </form>
      </div>
    </div>
  </div>
</main>

<script>
  function updateMainImage(url, btnElement) {
    // Podmiana głównego zdjęcia
    const mainImg = document.getElementById('main-image');
    mainImg.style.opacity = '0';
    setTimeout(() => {
      mainImg.src = url;
      mainImg.style.opacity = '1';
    }, 150);

    // Aktualizacja ramek miniaturek
    document.querySelectorAll('.thumbnail-btn').forEach(btn => {
      btn.classList.remove('border-indigo-600', 'ring-2', 'ring-indigo-100');
      btn.classList.add('border-gray-100');
    });
    btnElement.classList.add('border-indigo-600', 'ring-2', 'ring-indigo-100');
    btnElement.classList.remove('border-gray-100');
  }
</script>

</body>
</html>
