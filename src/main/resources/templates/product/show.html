<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">

<!-- 1. IMPORT HEADER (Podmieniony stary <head>) -->
<head th:replace="~{fragments/layout :: header(${product.name})}"></head>

<body class="bg-gray-50 min-h-screen" th:with="images=${product.images}">

<!-- 2. IMPORT NAVBAR (Podmieniony stary <nav>) -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="max-w-6xl mx-auto px-4 pb-12">
  <div class="flex flex-col md:flex-row gap-12 bg-white p-8 rounded-3xl shadow-sm border border-gray-100">

    <!-- LEWA KOLUMNA: GALERIA -->
    <div class="md:w-1/2 space-y-6">

      <!-- Kontener zdjęcia głównego -->
      <div class="relative aspect-square bg-gray-50 rounded-2xl overflow-hidden border border-gray-100 shadow-inner">

        <!-- Logika: Wyświetlamy tylko JEDEN obrazek główny -->
        <th:block th:if="${not #lists.isEmpty(images)}">
          <img id="main-image"
               th:src="${product.imageUrl != null ? '/uploads/' + product.imageUrl : '/uploads/' + images[0].url}"
               class="w-full h-full object-contain p-4 transition-opacity duration-300"
               alt="Produkt">
        </th:block>

        <img th:if="${#lists.isEmpty(images)}"
             id="main-image-placeholder"
             src="https://via.placeholder.com/600x600?text=Brak+zdjęcia"
             class="w-full h-full object-contain p-4" alt="Brak zdjęcia">

        <form th:action="@{/product/{id}/favourite(id=${product.id})}" method="post" class="absolute top-4 right-4">
          <button type="submit" class="bg-white/90 p-3 rounded-full shadow-md hover:scale-110 transition">
            <svg class="w-6 h-6 text-gray-300 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
          </button>
        </form>
      </div>

      <!-- Miniaturki -->
      <div class="grid grid-cols-4 gap-4" th:if="${not #lists.isEmpty(images)}">
        <button th:each="img : ${images}"
                type="button"
                class="thumbnail-btn border-2 rounded-xl overflow-hidden aspect-square bg-white transition-all"
                th:classappend="${img.isMain} ? 'border-indigo-600 ring-2 ring-indigo-100' : 'border-gray-100'"
                th:data-url="${'/uploads/' + img.url}"
                onclick="updateMainImage(this)">
          <img th:src="@{'/uploads/' + ${img.url}}" class="w-full h-full object-cover">
        </button>
      </div>
    </div>

    <!-- PRAWA KOLUMNA: INFORMACJE -->
    <div class="md:w-1/2 space-y-8">
      <div>
        <span class="inline-block bg-indigo-50 text-indigo-700 px-3 py-1 rounded-lg text-xs font-bold uppercase mb-3"
              th:text="${product.category != null ? product.category.name : 'Bez kategorii'}">Kategoria</span>
        <h1 class="text-4xl font-extrabold text-gray-900" th:text="${product.name}">Nazwa</h1>
      </div>

      <div class="flex items-center gap-6">
        <span class="text-3xl font-black text-gray-900" th:text="${product.price} + ' PLN'">0.00 PLN</span>
        <span th:if="${product.stockQuantity > 0}" class="text-green-600 font-bold text-sm">● Dostępny (<span th:text="${product.stockQuantity}"></span> szt.)</span>
        <span th:unless="${product.stockQuantity > 0}" class="text-red-500 font-bold text-sm">● Brak</span>
      </div>

      <p class="text-gray-600 text-lg leading-relaxed" th:text="${product.description}">Opis...</p>

      <div class="pt-8 border-t border-gray-100">
        <form class="space-y-6">
          <div class="flex flex-col gap-1">
            <label class="text-xs font-bold text-gray-400 uppercase">Ilość</label>
            <input type="number" value="1" min="1" th:max="${product.stockQuantity}"
                   class="w-24 border-2 border-gray-100 rounded-xl p-3 focus:border-indigo-500 outline-none text-center font-black">
          </div>
          <button type="submit" th:disabled="${product.stockQuantity <= 0}"
                  class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl hover:bg-indigo-700 transition-all shadow-xl disabled:bg-gray-200 uppercase tracking-wider">
            Dodaj do koszyka
          </button>
        </form>
      </div>
    </div>
  </div>
</main>

<!-- 3. IMPORT FOOTER (Dodany na końcu) -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
  function updateMainImage(btnElement) {
    const mainImg = document.getElementById('main-image') || document.getElementById('main-image-placeholder');
    const newUrl = btnElement.getAttribute('data-url');

    if (!mainImg || !newUrl) return;

    mainImg.style.opacity = '0.3';
    setTimeout(() => {
      mainImg.src = newUrl;
      mainImg.style.opacity = '1';
    }, 100);

    document.querySelectorAll('.thumbnail-btn').forEach(btn => {
      btn.classList.remove('border-indigo-600', 'ring-2', 'ring-indigo-100');
      btn.classList.add('border-gray-100');
    });

    btnElement.classList.add('border-indigo-600', 'ring-2', 'ring-indigo-100');
    btnElement.classList.remove('border-gray-100');
  }
</script>

</body>
</html>
