<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">

<!-- 1. ŁĄCZYMY SIĘ Z GŁÓWNYM LAYOUTEM -->
<section th:replace="~{layout :: main-layout(~{::main})}">

  <!-- Przenosimy zmienną 'images' do tagu main, aby była dostępna wewnątrz -->
  <main class="max-w-6xl mx-auto px-4 pb-12" th:with="images=${product.images}">

    <!-- NAGŁÓWEK STRONY (Nawigacja powrotna) -->
    <div class="mb-8 pt-4">
      <a th:href="@{/product}" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-indigo-600 transition flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Powrót do produktów
      </a>
    </div>

    <div class="flex flex-col md:flex-row gap-12 bg-white p-8 rounded-[3rem] shadow-sm border border-gray-100">

      <!-- LEWA KOLUMNA: GALERIA -->
      <div class="md:w-1/2 space-y-6">
        <!-- Kontener zdjęcia głównego -->
        <div class="relative aspect-square bg-gray-50 rounded-[2.5rem] overflow-hidden border border-gray-100 shadow-inner">
          <th:block th:if="${not #lists.isEmpty(images)}">
            <img id="main-image"
                 th:src="${product.imageUrl != null ? '/uploads/' + product.imageUrl : '/uploads/' + images[0].url}"
                 class="w-full h-full object-contain p-8 transition-opacity duration-300"
                 alt="Produkt">
          </th:block>

          <img th:if="${#lists.isEmpty(images)}"
               id="main-image-placeholder"
               src="https://via.placeholder.com/600x600?text=Brak+zdjęcia"
               class="w-full h-full object-contain p-8 opacity-20" alt="Brak zdjęcia">

          <form th:action="@{/product/{id}/favourite(id=${product.id})}" method="post" class="absolute top-6 right-6">
            <button type="submit" class="bg-white/90 p-4 rounded-full shadow-md hover:scale-110 transition active:scale-95">
              <svg class="w-6 h-6 text-gray-300 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
              </svg>
            </button>
          </form>
        </div>

        <!-- Miniaturki -->
        <div class="grid grid-cols-4 gap-4" th:if="${not #lists.isEmpty(images)}">
          <button th:each="img : ${images}"
                  type="button"
                  class="thumbnail-btn border-2 rounded-2xl overflow-hidden aspect-square bg-white transition-all hover:border-indigo-300"
                  th:classappend="${img.isMain} ? 'border-indigo-600 ring-4 ring-indigo-50' : 'border-gray-50'"
                  th:data-url="${'/uploads/' + img.url}"
                  onclick="updateMainImage(this)">
            <img th:src="@{'/uploads/' + ${img.url}}" class="w-full h-full object-cover">
          </button>
        </div>
      </div>

      <!-- PRAWA KOLUMNA: INFORMACJE -->
      <div class="md:w-1/2 space-y-8 py-4">
        <div>
          <span class="inline-block bg-indigo-50 text-indigo-700 px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest mb-4"
                th:text="${product.category != null ? product.category.name : 'Bez kategorii'}">Kategoria</span>
          <h1 class="text-4xl font-black text-gray-900 tracking-tighter uppercase" th:text="${product.name}">Nazwa</h1>
        </div>

        <div class="flex items-center gap-6">
          <span class="text-4xl font-black text-gray-900" th:text="${product.price} + ' PLN'">0.00 PLN</span>
          <div class="flex flex-col">
              <span th:if="${product.stockQuantity > 0}" class="text-green-600 font-black text-[10px] uppercase tracking-widest flex items-center gap-1">
                  <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Dostępny
              </span>
            <span th:unless="${product.stockQuantity > 0}" class="text-red-500 font-black text-[10px] uppercase tracking-widest flex items-center gap-1">
                  <span class="w-2 h-2 bg-red-500 rounded-full"></span> Brak na stanie
              </span>
            <span class="text-gray-400 text-[10px] font-bold uppercase" th:if="${product.stockQuantity > 0}">
                  Ilość: <span th:text="${product.stockQuantity}"></span> sztuk
              </span>
          </div>
        </div>

        <p class="text-gray-500 text-lg leading-relaxed font-medium" th:text="${product.description}">Opis...</p>

        <div class="pt-8 border-t border-gray-100">
          <form class="space-y-6">
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Wybierz ilość</label>
              <input type="number" value="1" min="1" th:max="${product.stockQuantity}"
                     class="w-24 border-2 border-gray-100 rounded-2xl p-4 focus:border-indigo-500 outline-none text-center font-black text-lg transition-colors">
            </div>
            <button type="submit" th:disabled="${product.stockQuantity <= 0}"
                    class="w-full bg-gray-900 text-white font-black py-6 rounded-[1.5rem] hover:bg-indigo-600 transition-all shadow-2xl shadow-indigo-100 disabled:bg-gray-200 uppercase tracking-widest text-xs active:scale-[0.98]">
              Dodaj do koszyka
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- SKRYPT GALERII (Zostaje wewnątrz main, aby działał) -->
    <script>
      function updateMainImage(btnElement) {
        const mainImg = document.getElementById('main-image') || document.getElementById('main-image-placeholder');
        const newUrl = btnElement.getAttribute('data-url');

        if (!mainImg || !newUrl) return;

        mainImg.style.opacity = '0.3';
        setTimeout(() => {
          mainImg.src = newUrl;
          mainImg.style.opacity = '1';
        }, 100);

        document.querySelectorAll('.thumbnail-btn').forEach(btn => {
          btn.classList.remove('border-indigo-600', 'ring-4', 'ring-indigo-50');
          btn.classList.add('border-gray-50');
        });

        btnElement.classList.add('border-indigo-600', 'ring-4', 'ring-indigo-50');
        btnElement.classList.remove('border-gray-50');
      }
    </script>
  </main>
</section>
</html>
