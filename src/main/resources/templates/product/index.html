<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Lista Produktów</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<nav class="bg-white shadow-md p-4 mb-8">
  <div class="container mx-auto flex justify-between items-center">
    <a th:href="@{/product}" class="text-xl font-bold text-indigo-600">Sklep ZTI</a>
    <div class="space-x-6">
      <a th:href="@{/product}" class="text-gray-600 hover:text-indigo-600">Produkty</a>
      <a th:href="@{/admin/product}" class="text-gray-600 hover:text-indigo-600 font-semibold">Panel Admina</a>
    </div>
  </div>
</nav>

<div class="container mx-auto px-4">
  <h1 class="text-3xl font-extrabold text-gray-900 mb-8">Nasze Produkty</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

    <div th:each="product : ${products}" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-xl transition-shadow duration-300 flex flex-col">

      <div class="h-48 bg-gray-200 flex items-center justify-center">
        <span class="text-gray-400">Brak zdjęcia</span>
      </div>

      <div class="p-6 flex-grow">
        <div class="flex justify-between items-start mb-2">
          <h2 class="text-xl font-bold text-gray-800" th:text="${product.name}">Nazwa Produktu</h2>
          <span class="bg-indigo-100 text-indigo-700 text-sm font-bold px-3 py-1 rounded-full"
                th:text="${product.price} + ' PLN'">0 PLN</span>
        </div>

        <p class="text-gray-600 text-sm mb-4 line-clamp-2" th:text="${product.description}">
          Krótki opis produktu pobrany z bazy danych...
        </p>

        <div class="flex items-center text-sm text-gray-500 mb-6">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-3m-3 0H9m-3 0H6"></path>
          </svg>
          Dostępność: <span class="font-semibold ml-1" th:text="${product.stockQuantity}">0</span> szt.
        </div>

        <a th:href="@{/product/{id}(id=${product.id})}"
           class="block w-full text-center bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transition-colors">
          Szczegóły produktu
        </a>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(products)}" class="text-center py-20">
    <p class="text-gray-500 text-xl">Brak produktów w bazie danych.</p>
    <a th:href="@{/admin/product/new}" class="text-indigo-600 font-bold mt-4 inline-block underline">Dodaj pierwszy produkt</a>
  </div>
</div>

</body>
</html>
