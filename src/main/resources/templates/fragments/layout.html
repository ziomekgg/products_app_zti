<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">

<!-- UNIFIKOWANY HEADER (Partial z PHP) -->
<head th:fragment="header(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' | Sklep ZTI'">Sklep ZTI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

<body>
<!-- UNIFIKOWANA NAWIGACJA -->
<nav th:fragment="navbar" class="bg-white shadow-sm p-4 mb-8 border-b">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-8">
      <a th:href="@{/product}" class="text-indigo-600 font-bold text-2xl tracking-tighter uppercase">Sklep ZTI</a>
      <div class="hidden md:flex space-x-6 items-center">
        <a th:href="@{/product}" class="text-gray-600 hover:text-indigo-600 font-medium transition">Produkty</a>
        <!-- Moduł Sterowania: Link widoczny tylko dla admina (do zrobienia autoryzacja) -->
        <a th:href="@{/admin/product}" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-indigo-100 transition">Panel Admina</a>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <div class="relative cursor-pointer group">
        <span class="absolute -top-2 -right-2 bg-indigo-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full group-hover:scale-110 transition">0</span>
        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
      </div>
      <div class="h-8 w-8 bg-gray-200 rounded-full border border-gray-100"></div>
    </div>
  </div>
</nav>

<!-- UNIFIKOWANY FOOTER -->
<footer th:fragment="footer" class="bg-white border-t mt-20 py-12">
  <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12">
    <div>
      <h4 class="text-indigo-600 font-black text-xl mb-4">SKLEP ZTI</h4>
      <p class="text-gray-500 text-sm leading-relaxed">Twoje centrum zarządzania produktami oparte na architekturze Modułu Mocy i Sterowania.</p>
    </div>
    <div>
      <h5 class="font-bold text-gray-900 mb-4">Nawigacja</h5>
      <ul class="space-y-2 text-sm text-gray-500">
        <li><a th:href="@{/product}" class="hover:text-indigo-600">Katalog produktów</a></li>
        <li><a href="#" class="hover:text-indigo-600">Koszyk</a></li>
        <li><a th:href="@{/admin/product}" class="hover:text-indigo-600">Zarządzanie</a></li>
      </ul>
    </div>
    <div>
      <h5 class="font-bold text-gray-900 mb-4">Kontakt</h5>
      <p class="text-sm text-gray-500">System ZTI 2026<br>Projekt zaliczeniowy</p>
    </div>
  </div>
  <div class="max-w-7xl mx-auto px-4 mt-12 pt-8 border-t text-center text-xs text-gray-400">
    &copy; 2026 Sklep ZTI. Wszystkie prawa zastrzeżone.
  </div>
</footer>
</body>
</html>
