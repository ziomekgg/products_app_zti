<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main-layout(~{::main})}">
<body>
<main class="max-w-4xl mx-auto px-4 py-16 text-center">
  <h1 class="text-4xl font-black text-gray-900 uppercase tracking-tighter mb-12">Zwroty i Reklamacje</h1>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <div class="p-8 bg-white rounded-[2.5rem] border border-gray-100">
      <span class="text-3xl mb-4 block">📦</span>
      <h3 class="font-black uppercase text-[10px] tracking-widest mb-2">Krok 1</h3>
      <p class="text-xs font-bold text-gray-400">Zapakuj bezpiecznie wadliwy moduł.</p>
    </div>
    <div class="p-8 bg-white rounded-[2.5rem] border border-gray-100">
      <span class="text-3xl mb-4 block">📝</span>
      <h3 class="font-black uppercase text-[10px] tracking-widest mb-2">Krok 2</h3>
      <p class="text-xs font-bold text-gray-400">Wypełnij formularz w panelu klienta.</p>
    </div>
    <div class="p-8 bg-white rounded-[2.5rem] border border-gray-100">
      <span class="text-3xl mb-4 block">🚚</span>
      <h3 class="font-black uppercase text-[10px] tracking-widest mb-2">Krok 3</h3>
      <p class="text-xs font-bold text-gray-400">Wyślij paczkę na adres naszej serwerowni (może odpowiemy).</p>
    </div>
  </div>
</main>
</body>
</html>
