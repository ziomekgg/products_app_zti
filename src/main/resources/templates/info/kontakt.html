<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main-layout(~{::main})}">
<body>
<main class="max-w-4xl mx-auto px-4 py-16">
  <div class="bg-white p-10 md:p-16 rounded-[3rem] shadow-2xl shadow-indigo-100/50 border border-gray-50">
    <header class="mb-12">
      <h1 class="text-4xl font-black text-gray-900 uppercase tracking-tighter">Kontakt</h1>
      <p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest mt-2">Dział Obsługi Modułów</p>
    </header>
    <form class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 px-2 tracking-widest">Twoja ścieżka (Email)</label>
          <input type="email" class="w-full bg-gray-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-indigo-500 font-bold" placeholder="operator@domena.pl">
        </div>
        <div>
          <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 px-2 tracking-widest">Temat sygnału</label>
          <select class="w-full bg-gray-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-indigo-500 font-bold">
            <option>Błąd Modułu </option>
            <option>Zapytanie o dostępność</option>
            <option>Inne</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 px-2 tracking-widest">Treść komunikatu</label>
        <textarea rows="5" class="w-full bg-gray-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-indigo-500 font-bold" placeholder="Wpisz wiadomość..."></textarea>
      </div>
      <button type="button" class="bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black uppercase text-[11px] tracking-widest hover:bg-gray-900 transition-all shadow-lg shadow-indigo-200">
        Wyślij sygnał
      </button>
    </form>
  </div>
</main>
</body>
</html>
